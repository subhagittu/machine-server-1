<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host-Server Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0f14;
      --bg2:         #13161e;
      --glass:       rgba(255,255,255,0.05);
      --glass-hover: rgba(255,255,255,0.08);
      --border:      rgba(255,255,255,0.08);
      --accent:      #6c63ff;
      --accent2:     #a78bfa;
      --accent-glow: rgba(108,99,255,0.35);
      --user-msg:    linear-gradient(135deg,#6c63ff,#a78bfa);
      --server-msg:  rgba(255,255,255,0.06);
      --text:        #e2e8f0;
      --text-muted:  #64748b;
      --green:       #34d399;
      --radius:      18px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Animated background ───────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(167,139,250,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(52,211,153,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ────────────────────────────────────────────────── */
    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh; max-width: 820px;
      margin: 0 auto;
      padding: 20px 16px 16px;
      gap: 16px;
    }

    /* ── Header ────────────────────────────────────────────────── */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 22px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px var(--accent-glow);
    }

    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--user-msg);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(135deg,#fff,#a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .header-info p {
      font-size: 0.75rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    .header-badge {
      margin-left: auto;
      font-size: 0.7rem; font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(108,99,255,0.2);
      border: 1px solid rgba(108,99,255,0.4);
      color: var(--accent2);
      letter-spacing: 0.5px;
    }

    /* ── Quick suggestions ─────────────────────────────────────── */
    .suggestions {
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .chip {
      padding: 6px 14px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .chip:hover {
      background: rgba(108,99,255,0.2);
      border-color: rgba(108,99,255,0.5);
      color: var(--accent2);
      transform: translateY(-1px);
    }

    /* ── Chat window ───────────────────────────────────────────── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      display: flex; flex-direction: column;
      gap: 14px;
      padding: 20px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      scroll-behavior: smooth;
    }

    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.4); border-radius: 4px; }

    /* ── Messages ──────────────────────────────────────────────── */
    .msg-row {
      display: flex; gap: 10px; align-items: flex-end;
      animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }

    .msg-row.server .msg-avatar {
      background: linear-gradient(135deg,#6c63ff,#a78bfa);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .msg-row.user .msg-avatar {
      background: rgba(255,255,255,0.1);
    }

    .bubble-wrap {
      max-width: 72%;
      display: flex; flex-direction: column; gap: 4px;
    }

    .msg-row.user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 0.88rem;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-row.user .bubble {
      background: var(--user-msg);
      border-bottom-right-radius: 4px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    }

    .msg-row.server .bubble {
      background: var(--server-msg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      backdrop-filter: blur(10px);
    }

    /* bold within server messages */
    .bubble b { color: var(--accent2); }

    .msg-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* ── Typing indicator ──────────────────────────────────────── */
    .typing-row {
      display: flex; gap: 10px; align-items: flex-end;
      animation: slideUp 0.3s ease;
    }

    .typing-bubble {
      padding: 12px 16px;
      background: var(--server-msg);
      border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      display: flex; gap: 5px; align-items: center;
    }

    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent2);
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30%          { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ─────────────────────────────────────────────── */
    .input-bar {
      display: flex; gap: 10px; align-items: flex-end;
      padding: 14px 16px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      transition: border-color 0.2s;
    }

    .input-bar:focus-within {
      border-color: rgba(108,99,255,0.5);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
    }

    #msgInput {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem; color: var(--text);
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      padding: 2px 0;
    }

    #msgInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none; cursor: pointer;
      background: var(--user-msg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px var(--accent-glow);
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    #sendBtn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #sendBtn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── Connection toast ──────────────────────────────────────── */
    #toast {
      position: fixed; top: 20px; right: 20px;
      padding: 10px 18px; border-radius: 10px;
      font-size: 0.8rem; font-weight: 500;
      background: rgba(30,30,40,0.9);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      opacity: 0; pointer-events: none;
      transform: translateY(-6px);
      transition: all 0.3s ease;
      z-index: 999;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: rgba(52,211,153,0.5); color: var(--green); }
    #toast.error   { border-color: rgba(248,113,113,0.5); color: #f87171; }

    /* ── Empty state ───────────────────────────────────────────── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-muted);
      user-select: none;
    }

    .empty-state .icon { font-size: 2.5rem; }
    .empty-state p { font-size: 0.85rem; }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="avatar">🖥️</div>
    <div class="header-info">
      <h1>Host-Server</h1>
      <p><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></p>
    </div>
    <span class="header-badge" id="msgCount">0 messages</span>
  </header>

  <!-- Quick suggestion chips -->
  <div class="suggestions" id="chips">
    <span class="chip" onclick="sendChip('hello')">👋 hello</span>
    <span class="chip" onclick="sendChip('how are you')">😊 how are you</span>
    <span class="chip" onclick="sendChip('joke')">😂 joke</span>
    <span class="chip" onclick="sendChip('time')">🕐 time</span>
    <span class="chip" onclick="sendChip('date')">📅 date</span>
    <span class="chip" onclick="sendChip('help')">❓ help</span>
  </div>

  <!-- Chat window -->
  <div class="chat-window" id="chatWindow"></div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea id="msgInput" rows="1" placeholder="Type a message… (Enter to send)" autocomplete="off"></textarea>
    <button id="sendBtn" disabled title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const chatWindow = document.getElementById('chatWindow');
  const msgInput   = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const statusDot  = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const msgCountEl = document.getElementById('msgCount');
  const toast      = document.getElementById('toast');

  let msgCount = 0;
  let ws;
  let typingEl = null;

  // ── WebSocket ───────────────────────────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    // If opened via VS Code Live Server (e.g. port 5501) or file://, connect to the local Node server on port 8070.
    // Otherwise, connect to the current domain/host directly.
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    const host = (isLocal && location.port && location.port !== '8070') ? 'localhost:8070' : location.host;
    ws = new WebSocket(`${proto}://${host}`);

    ws.onopen = () => {
      setStatus(true);
      sendBtn.disabled = false;
      showToast('Connected to server ✓', 'success');
    };

    ws.onmessage = (event) => {
      removeTyping();
      const data = JSON.parse(event.data);
      appendMessage('server', data.text, data.time);
    };

    ws.onclose = () => {
      setStatus(false);
      sendBtn.disabled = true;
      showToast('Disconnected — retrying in 3s…', 'error');
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  // ── Status ──────────────────────────────────────────────────────────────────
  function setStatus(online) {
    statusDot.style.background = online ? 'var(--green)' : '#f87171';
    statusDot.style.boxShadow  = online ? '0 0 8px var(--green)' : '0 0 8px #f87171';
    statusText.textContent     = online ? 'Online · Host-Server' : 'Offline';
  }

  // ── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'success') {
    toast.textContent = msg;
    toast.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.className = '', 2800);
  }

  // ── Render message ──────────────────────────────────────────────────────────
  function appendMessage(role, text, time) {
    msgCount++;
    msgCountEl.textContent = `${msgCount} message${msgCount !== 1 ? 's' : ''}`;

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatarIcon = role === 'server' ? '🖥️' : '🧑';
    const timeStr    = time || new Date().toLocaleTimeString();

    // Render **bold** markdown
    const htmlText = text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');

    row.innerHTML = `
      <div class="msg-avatar">${avatarIcon}</div>
      <div class="bubble-wrap">
        <div class="bubble">${htmlText}</div>
        <span class="msg-time">${timeStr}</span>
      </div>`;

    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // ── Typing indicator ────────────────────────────────────────────────────────
  function showTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'typing-row';
    typingEl.innerHTML = `
      <div class="msg-avatar" style="background:linear-gradient(135deg,#6c63ff,#a78bfa);box-shadow:0 0 12px rgba(108,99,255,0.35)">🖥️</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    chatWindow.appendChild(typingEl);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  // ── Send message ────────────────────────────────────────────────────────────
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendMessage('user', text);
    ws.send(JSON.stringify({ text }));
    showTyping();

    msgInput.value = '';
    msgInput.style.height = 'auto';
  }

  function sendChip(text) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    appendMessage('user', text);
    ws.send(JSON.stringify({ text }));
    showTyping();
  }

  // ── Input events ────────────────────────────────────────────────────────────
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Boot ────────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
